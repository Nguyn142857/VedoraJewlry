server:
  port: 8080

spring:
  application:
    name: jewelry-shop-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jewelry_shop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: root
    password: tadtn
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-key-min-32-chars}
    expiration: ${JWT_EXPIRATION_MS:86400000}
